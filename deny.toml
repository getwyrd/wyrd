# The machine-checked dependency wall (ADR-0003 §2): a permissive license
# allowlist that denies adopter-infecting copyleft (AGPL) and source-available
# "paywall" licenses (BSL/SSPL), plus the RUSTSEC advisory database. A
# contribution that pulls in a disqualified license or a vulnerable crate fails
# `cargo deny check` in CI.
#
# AUDIT POLICY — what this file can and cannot see (ADR-0042, issues #439, #543).
# `cargo deny` / `cargo audit` traverse the **Rust dependency graph** recorded in
# Cargo.lock, but only as **resolved for the features they are invoked with**.
#
# THIS FILE GUARDS THE DEFAULT FEATURE GRAPH — the artifact we ship. `cargo deny
# check` (run by `cargo xtask ci`, xtask/src/main.rs) passes no feature flags, so
# the off-by-default backend features (`fdb`, `tikv`) resolve NO crates into the
# graph it walks: `foundationdb`, `libloading` and `tikv-client` are all absent
# from it. (Verify: `cargo tree -i tikv-client` fails on the default graph and
# resolves only under `--all-features`; `cargo deny list` likewise shows none of
# the three.)
#
# It therefore keeps a ZERO-TOLERANCE advisory wall: the `ignore` list below
# carries no exception for any off-by-default backend, and must not gain one.
# `cargo deny`'s ignores are keyed by advisory ID alone and apply to the whole
# graph they are used with, so a tikv-client exception parked here would also
# suppress that advisory if a future DEFAULT dependency ever pulled an affected
# version — silently holing the very wall this file exists to be.
#
# The off-by-default trees ARE audited — by two further walls `cargo xtask ci` runs
# after this one:
#
#   * ADVISORIES, from a SEPARATE config, because its exceptions must never reach
#     the shipped graph (#543):
#         cargo deny --all-features --config deny-all-features.toml check advisories
#     That is where the tikv-client advisory boundary is recorded. Read it before
#     assuming this file's silence about TiKV means TiKV is clean — it means TiKV's
#     ADVISORIES are out of this file's frame.
#
#   * LICENCES / bans / sources, from THIS file's policy, over the wider graph (#547):
#         cargo deny --all-features check licenses bans sources
#     ADR-0003 §2 judges *linked* crates, and a `--features fdb` / `--features tikv`
#     build genuinely links crates the default graph never sees. The allowlist below
#     therefore governs BOTH graphs and stays single-source: an allowlist applied to a
#     wider graph can only ever reject more, so — unlike an advisory `ignore`, which
#     SUPPRESSES — it carries no risk of holing the shipped-artifact wall, and needs no
#     second copy to drift out of step.
#
# What neither tool can see is **`libfdb_c` itself**: the FoundationDB C client is
# a system shared object installed from an upstream .deb/.rpm, linked at build
# time by `foundationdb-sys`. It appears in no lockfile, has no crates.io version,
# and carries no RUSTSEC advisories. Its advisory surface is therefore tracked
# OUT of band, by following upstream FoundationDB release notes and security
# announcements (https://github.com/apple/foundationdb/releases) and bumping the
# pinned version in lockstep across the three places that name it:
# `deploy/fdb-single-node/docker-compose.yml` (server image),
# `.github/workflows/fdb-conformance.yml` (client package), and
# `xtask::fdb_doctor::FDB_VERSION` (which xtask/tests/fdb_harness.rs asserts
# equal to the other two, so a partial bump fails the gate). The same split
# applies to any future backend whose Rust crate is a binding over a system
# library; it is a property of the tooling, not of this dependency.

[advisories]
# Fail on any RUSTSEC advisory for a crate in the dependency graph.
version = 2
yanked = "deny"
# Unsoundness advisories — a safe API that can cause UB — are scoped, not on/off:
# cargo-deny's default is `workspace`, i.e. only advisories against OUR OWN crates. That
# is close to useless here, because every crate we link is transitive; the shipped graph
# carried RUSTSEC-2026-0190 (`anyhow` <= 1.0.102: UB via `Error::downcast_mut()` after
# `Error::context`) and the wall said nothing. `all` audits the whole graph, which is the
# only scope that matches what "the dependency wall" claims to be. (#543; the anyhow bump
# to the patched 1.0.103 lands with this, so the wall is green on a real fix, not a waiver.)
unsound = "all"
ignore = [
    # bincode 1.3.3 is "unmaintained" — its team declared 1.3.3 complete and
    # ceased development; this is a maintenance notice, not a vulnerability. It
    # reaches us only as a test-only transitive dependency of `madsim` (the DST
    # tier, `wyrd-dst`), never in shipped code. Revisit if madsim moves off it.
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
# Permissive / clearly-licensed only (ADR-0003 §2). This list is the set
# currently encountered in the dependency graph; anything not on it is a build
# failure, so adding a new license is a deliberate, reviewed decision — exactly
# the "encode the test" intent of ADR-0003.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    # Permissive; reed-solomon-simd (the M1 erasure coder, ADR-0004) is
    # "MIT AND BSD-3-Clause". A deliberate addition (ADR-0003 §2).
    "BSD-3-Clause",
    "Unicode-3.0",
    # Permissive (OSI-approved, GPL-compatible). foldhash — hashbrown's default
    # hasher — reaches us transitively through the tonic/hyper gRPC stack (M2.1).
    # A deliberate addition (ADR-0003 §2).
    "Zlib",
    # Permissive (OSI-approved, GPL-compatible; the "simplified BSD-2-Clause" in
    # substance). Not encountered in the DEFAULT graph — every crate that needs it sits
    # behind an off-by-default backend feature — but genuinely linked by the builds this
    # allowlist now also governs (#547): `libloading` is a BUILD-time dependency of the
    # FoundationDB backend (ADR-0042: foundationdb-sys -> (build) bindgen -> clang-sys ->
    # libloading, which dlopen()s libclang to generate the libfdb_c FFI bindings), and
    # `ring` / `rustls` / `sct` / `untrusted` sit behind the tikv-client tree. No
    # ISC-licensed code is linked into a SHIPPED Wyrd binary.
    #
    # This entry used to be a fossil: retained for crates no wall actually inspected, and
    # warning `license-not-encountered` on every run because of it. The `--all-features`
    # licence wall (#547) now inspects them, so the entry is load-bearing and the warning
    # is gone — which is precisely the signal that the gap closed.
    "ISC",
]
confidence-threshold = 0.9

[bans]
# Foundation for later dependency hygiene; nothing banned outright yet.
multiple-versions = "allow"
wildcards = "deny"
# Internal workspace crates are referenced by path and so carry a wildcard
# version; that is expected and not the registry-wildcard hazard we deny.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
