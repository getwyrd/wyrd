name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug and how to reproduce it.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true