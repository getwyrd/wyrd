# Dependabot — keep the dependency surface current under the cargo-deny advisory
# wall (ADR-0003 §2). A stale lockfile is how a `cargo deny check` RUSTSEC
# advisory lands as a surprise CI failure; scheduled update PRs surface it as a
# tracked change instead. Two ecosystems: the Cargo workspace and the GitHub
# Actions pinned in `.github/workflows/`.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      # The RustCrypto crates share a `digest` / `crypto-common` core, and their
      # major releases move that core in lockstep: `sha2` 0.11 and `hmac` 0.13 both
      # jump to `digest` 0.11, so bumping either ALONE puts two `digest` versions in
      # the graph and `gateway-s3`'s HMAC construction stops compiling on the trait
      # bounds. Ungrouped, Dependabot files one PR per crate and every one of them is
      # red by construction (#525, #526 — both closed for this reason; the migration
      # itself is #541). Grouped, the bump arrives as a single PR that can at least
      # compile, and the API rewrite it still needs is reviewed against one diff.
      rustcrypto:
        patterns:
          - "sha2"
          - "sha1"
          - "hmac"
          - "digest"
          - "crypto-common"
          - "block-buffer"
          - "hkdf"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
