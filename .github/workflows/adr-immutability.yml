name: adr-immutability

# ADRs are append-only once ratified (see docs/design/adr/0001-record-architecture-decisions.md).
# Per ADR-0001 the lifecycle is Proposed -> Accepted -> Superseded, and the
# `status:` field in each ADR's YAML frontmatter is the source of truth:
#   - Proposed  -> a working draft; may be edited (or dropped) freely.
#   - Accepted  -> ratified and immutable; never rewritten, only superseded.
#   - Superseded by ADR-NNNN -> was Accepted, so likewise immutable.
#
# This check therefore fails a pull request only when it modifies, deletes, or
# renames an ADR that is *already* Accepted/Superseded in the PR's base — i.e.
# the version before the change. Reading status from the base is what makes the
# Proposed -> Accepted transition itself legal (base is still Proposed) while
# freezing the record from that point on. Adding new ADRs (status Added) and
# editing the docs/design/adr/README.md index stay allowed.
#
# Migration note: ADRs that predate ADR-0001 carry no YAML frontmatter. Those
# legacy records are outside this regime and are not enforced, which is what
# lets the one-time conversion of the foundational set to the new frontmatter
# format land. Once converted (every base version then carries frontmatter) the
# exemption no longer applies to anything.

# Runs on every pull request (no path filter) so the check always reports a
# status — required for it to be usable as a required status check. When a PR
# touches no immutable ADR, the job passes cheaply.
on:
  pull_request:

permissions:
  contents: read

jobs:
  adr-immutability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Reject changes to Accepted ADRs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Modified/Deleted/Renamed numbered ADR files. The [0-9]* glob
          # excludes README.md by design. --name-status lines are tab-
          # separated: "M\tpath", "D\tpath", "R<score>\told\tnew" — in every
          # case the second field is the path as it exists in the base, which
          # is the version whose status decides immutability.
          violations=""
          while IFS=$'\t' read -r change base_path _; do
            [ -n "$base_path" ] || continue

            base_content=$(git show "$BASE_SHA:$base_path" 2>/dev/null) || continue

            # Legacy, pre-ADR-0001 records have no YAML frontmatter and are not
            # under the immutability regime (see migration note above).
            [ "$(printf '%s\n' "$base_content" | head -n1)" = "---" ] || continue

            # Authoritative status from the frontmatter block.
            status=$(printf '%s\n' "$base_content" | awk '
              NR==1 && $0=="---" { infm=1; next }
              infm && /^---[[:space:]]*$/ { exit }
              infm && tolower($0) ~ /^status:/ {
                sub(/^[^:]*:[[:space:]]*/, ""); print; exit
              }')
            status_lc=$(printf '%s' "$status" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')

            # Only Proposed drafts are editable; anything ratified is frozen.
            if [ "$status_lc" != "proposed" ]; then
              violations="${violations}  ${change}\t${base_path} (status: ${status:-unknown})"$'\n'
            fi
          done < <(git diff --name-status --diff-filter=MDR "$BASE_SHA" "$HEAD_SHA" -- 'docs/design/adr/[0-9]*.md')

          if [ -n "$violations" ]; then
            echo "Immutable (Accepted/Superseded) ADRs were changed:"
            printf '%b' "$violations"
            echo
            echo "ADRs are append-only once Accepted — supersede with a new ADR instead of editing."
            exit 1
          fi
          echo "No Accepted ADRs were modified."
