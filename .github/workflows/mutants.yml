name: mutants

# Mutation testing (cargo-mutants): inject bugs — flip `<` to `<=`, replace a
# function body with `Ok(())` — and check the test suite catches them. A SURVIVING
# mutant is a behavior the 50-seed DST + conformance suite does not actually pin
# down: a hole in the project's core promise. This measures test *quality*, which
# line coverage cannot.
#
# ⚠️ EXPERIMENTAL / NON-GATING. The `cargo mutants` steps carry `continue-on-error`
# so this workflow never blocks a merge while it's being dialled in on this
# codebase. Once a clean run is confirmed, drop `continue-on-error` from the PR
# step and add `mutants` to branch protection to make per-PR mutation a real gate.
#
# Scope: the hand-written correctness crates are selected explicitly with
# `--package`. This is deliberate — it keeps `wyrd-dst` (which only compiles under
# `--cfg madsim`) and the generated `wyrd-proto` stubs out of the run WITHOUT
# fighting the workspace build, because neither is a dependency of the crates
# below, so cargo-mutants never builds them.
#
# Two jobs, by trigger:
#   * mutants-pr   — per-PR, `--in-diff`, single runner. Fast (<90s); only tests
#     mutants overlapping the PR's changed lines.
#   * mutants-full — nightly / manual, full sweep over the correctness crates.
#     SHARDED with `--shard i/N` across a job matrix so the run finishes well within
#     budget as the workspace grows: cargo-mutants partitions its mutant list
#     deterministically across N shards, so each runner tests ~1/N of them in
#     parallel. The expensive `wyrd-server` mutants (~5s build + ~13s test each) are
#     spread across all shards, which is what buys the wall-clock win: an unsharded
#     sweep was ~18–22 min, and sharding gives generous headroom under the per-job
#     `timeout-minutes` backstop.
#
# NOTE: neither `timeout-minutes` nor the shard count is what keeps a runaway mutant
# from killing a shard. A mutant that turns a loop counter into a no-op
# (`i += 1` → `i *= 1`) makes an allocating loop run forever and OOM-kills the runner
# in seconds — far inside any time budget, and on whatever shard the mutant lands.
# It surfaces as a spurious "operation was canceled" (NOT a TIMEOUT), which is what
# was originally misread as an "external runner shutdown" (issue #216). That class is
# contained by running each sweep inside a memory-capped cgroup; see the steps below.

on:
  pull_request:
    types: [opened, reopened, synchronize]
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC nightly full sweep
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutants-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR mode: only test mutants that overlap the lines this PR changed — fast
  # enough to run per-PR. `--in-diff` is applied on top of the `--package`
  # filters, so it stays scoped to the correctness crates.
  mutants-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the `--in-diff` step can diff against the base.
          fetch-depth: 0

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: mutants

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: cargo mutants (PR diff)
        continue-on-error: true
        # Memory-capped cgroup — see the full-sweep step below for why: a
        # no-op-loop-counter mutant can OOM-kill the runner before the timeout
        # fires. `OOMPolicy=continue` confines the kill to the runaway test.
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}" > pr.diff
          sudo systemd-run --scope --quiet --collect \
            -p MemoryMax=12G -p MemorySwapMax=0 -p OOMPolicy=continue \
            --uid="$(id -u)" --gid="$(id -g)" \
            --setenv=HOME="$HOME" --setenv=PATH="$PATH" \
            --setenv=CARGO_HOME="${CARGO_HOME:-$HOME/.cargo}" \
            --setenv=RUSTUP_HOME="${RUSTUP_HOME:-$HOME/.rustup}" \
            "$(command -v cargo)" mutants --in-diff pr.diff --no-shuffle \
            --package wyrd-chunk-format \
            --package wyrd-core \
            --package wyrd-traits \
            --package wyrd-metadata-redb \
            --package wyrd-chunkstore-fs \
            --package wyrd-chunkstore-grpc \
            --package wyrd-coordination-mem \
            --package wyrd-server

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-pr
          path: mutants.out/
          if-no-files-found: ignore

  # Nightly / manual: full sweep over the correctness crates, sharded across a
  # matrix. Tracked like the bench — surfaced for visibility, never a gate.
  mutants-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30 # backstop: clear signal if a shard ever blows past budget
    strategy:
      fail-fast: false # one shard's miss/timeout must not cancel the others
      matrix:
        # N=8; ~60 mutants/shard, ~5 min each. Smaller shards shrink the window in
        # which the heaviest shard (the wyrd-server mutants) can be reclaimed/cancelled
        # by an external runner shutdown before it finishes (issue #216).
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: mutants

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: cargo mutants (full sweep, shard ${{ matrix.shard }}/8)
        continue-on-error: true
        # Run the sweep inside a memory-capped cgroup. A mutant that turns a
        # loop counter into a no-op — e.g. `i += 1` → `i *= 1`, which cargo-mutants
        # generates for every such counter — makes an allocating loop run forever
        # (`positionals.push(args[0].clone())` with `i` stuck at 0). That fills RAM
        # and OOM-kills the whole runner *before* the per-mutant timeout can fire,
        # so the failure surfaces as a spurious "operation was canceled" rather than
        # a TIMEOUT, and `continue-on-error` cannot catch it (a cancelled runner is
        # not a non-zero step). The cap + `OOMPolicy=continue` makes the kernel
        # OOM-kill only the runaway *test* subprocess; cargo-mutants survives,
        # records the mutant as caught, and the sweep finishes. The runner agent
        # lives outside the scope, so the cap can never take the runner down.
        run: |
          sudo systemd-run --scope --quiet --collect \
            -p MemoryMax=12G -p MemorySwapMax=0 -p OOMPolicy=continue \
            --uid="$(id -u)" --gid="$(id -g)" \
            --setenv=HOME="$HOME" --setenv=PATH="$PATH" \
            --setenv=CARGO_HOME="${CARGO_HOME:-$HOME/.cargo}" \
            --setenv=RUSTUP_HOME="${RUSTUP_HOME:-$HOME/.rustup}" \
            "$(command -v cargo)" mutants --no-shuffle --shard ${{ matrix.shard }}/8 \
            --package wyrd-chunk-format \
            --package wyrd-core \
            --package wyrd-traits \
            --package wyrd-metadata-redb \
            --package wyrd-chunkstore-fs \
            --package wyrd-chunkstore-grpc \
            --package wyrd-coordination-mem \
            --package wyrd-server

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-${{ github.event_name }}-shard${{ matrix.shard }}
          path: mutants.out/
          if-no-files-found: ignore
