name: mutants

# Mutation testing (cargo-mutants): inject bugs — flip `<` to `<=`, replace a
# function body with `Ok(())` — and check the test suite catches them. A SURVIVING
# mutant is a behavior the 50-seed DST + conformance suite does not actually pin
# down: a hole in the project's core promise. This measures test *quality*, which
# line coverage cannot.
#
# ⚠️ EXPERIMENTAL / NON-GATING. The `cargo mutants` steps carry `continue-on-error`
# so this workflow never blocks a merge while it's being dialled in on this
# codebase. Once a clean run is confirmed, drop `continue-on-error` from the PR
# step and add `mutants` to branch protection to make per-PR mutation a real gate.
#
# Scope: the hand-written correctness crates are selected explicitly with
# `--package`. This is deliberate — it keeps `wyrd-dst` (which only compiles under
# `--cfg madsim`) and the generated `wyrd-proto` stubs out of the run WITHOUT
# fighting the workspace build, because neither is a dependency of the crates
# below, so cargo-mutants never builds them.
#
# Two jobs, by trigger:
#   * mutants-pr   — per-PR, `--in-diff`, single runner. Fast (<90s); only tests
#     mutants overlapping the PR's changed lines.
#   * mutants-full — nightly / manual, full sweep over the correctness crates.
#     SHARDED with `--shard i/N` across a job matrix so the run finishes well within
#     budget as the workspace grows: cargo-mutants partitions its mutant list
#     deterministically across N shards, so each runner tests ~1/N of them in
#     parallel. The expensive `wyrd-server` mutants (~5s build + ~13s test each) are
#     spread across all shards, which is what buys the wall-clock win. A single
#     unsharded sweep was ~18–22 min and sat right at the edge of being interrupted
#     before the report finalized; sharding gives generous headroom under the
#     per-job `timeout-minutes` backstop.

on:
  pull_request:
    types: [opened, reopened, synchronize]
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC nightly full sweep
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutants-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR mode: only test mutants that overlap the lines this PR changed — fast
  # enough to run per-PR. `--in-diff` is applied on top of the `--package`
  # filters, so it stays scoped to the correctness crates.
  mutants-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the `--in-diff` step can diff against the base.
          fetch-depth: 0

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: mutants

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: cargo mutants (PR diff)
        continue-on-error: true
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}" > pr.diff
          cargo mutants --in-diff pr.diff --no-shuffle \
            --package wyrd-chunk-format \
            --package wyrd-core \
            --package wyrd-traits \
            --package wyrd-metadata-redb \
            --package wyrd-chunkstore-fs \
            --package wyrd-chunkstore-grpc \
            --package wyrd-coordination-mem \
            --package wyrd-server

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-pr
          path: mutants.out/
          if-no-files-found: ignore

  # Nightly / manual: full sweep over the correctness crates, sharded across a
  # matrix. Tracked like the bench — surfaced for visibility, never a gate.
  mutants-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30 # backstop: clear signal if a shard ever blows past budget
    strategy:
      fail-fast: false # one shard's miss/timeout must not cancel the others
      matrix:
        shard: [0, 1, 2, 3] # N=4; each ~4–5 min, generous headroom under 30 min
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: mutants

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: cargo mutants (full sweep, shard ${{ matrix.shard }}/4)
        continue-on-error: true
        run: |
          cargo mutants --no-shuffle --shard ${{ matrix.shard }}/4 \
            --package wyrd-chunk-format \
            --package wyrd-core \
            --package wyrd-traits \
            --package wyrd-metadata-redb \
            --package wyrd-chunkstore-fs \
            --package wyrd-chunkstore-grpc \
            --package wyrd-coordination-mem \
            --package wyrd-server

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-${{ github.event_name }}-shard${{ matrix.shard }}
          path: mutants.out/
          if-no-files-found: ignore
