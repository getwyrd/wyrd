name: ci

# The Rust gate (ADR-0009): a thin caller of `cargo xtask ci`, so the same
# checks — fmt, clippy (-D warnings), build, test, cargo-deny, conformance —
# run identically on a laptop and here. CI logic lives in Rust (xtask), not
# YAML (ADR-0016).
#
# Docs-only changes skip this gate (paths-ignore below): nothing under docs/ or
# any Markdown/legal file can affect the Rust build. This is safe because the
# Rust gate is NOT a required status check, so a skipped run never leaves a
# docs-only PR stuck "pending" — unlike the required checks (require-issue,
# docs-check, adr-immutability), which deliberately carry no paths filter so
# they always report. DCO sign-off must cover every commit (docs included), so
# it lives in its own always-on workflow (dco.yml), unaffected by this filter.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    types: [opened, reopened, synchronize]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      # Installs the toolchain pinned by rust-toolchain.toml (with rustfmt and
      # clippy) on first use.
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Prebuilt binary, so the license/advisory wall costs seconds, not a
      # from-source compile.
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo xtask ci
        run: cargo xtask ci

      # EC throughput numbers (issue #99), tracked for regression visibility in
      # the run log — NOT a gate: CI wall-clock is noisy, so a slowdown never
      # blocks a merge. Reuses the warm cache from the step above (the bench is
      # already compiled by `cargo xtask ci`'s `build --all-targets`).
      - name: cargo xtask bench (tracked, non-gating)
        run: cargo xtask bench
        continue-on-error: true
