name: ci

# The Rust gate (ADR-0009): a thin caller of `cargo xtask ci`, so the same
# checks — fmt, clippy (-D warnings), build, test, cargo-deny, conformance —
# run identically on a laptop and here. CI logic lives in Rust (xtask), not
# YAML (ADR-0016).
#
# Docs-only changes skip the heavy `rust` job (issue #125): nothing under docs/
# or any Markdown/legal file can affect the Rust build. Previously that skip was
# a workflow-level `paths-ignore`, which meant the WHOLE workflow was skipped on
# docs-only PRs — and a skipped workflow's checks stay "pending", so the gate
# could never be a required status check without wedging docs-only PRs.
#
# Instead the workflow now always runs; a cheap `changes` job decides whether any
# non-docs (code) file changed, and `rust` is skipped (not the workflow) when it
# did not. The always-runs `gate` job aggregates the result: it reports success
# when `rust` passed OR was skipped (docs-only), failure otherwise. `gate` carries
# no paths filter and therefore always reports, so it is the job to add to the
# branch-protection required-checks set (the admin flip itself is done by a
# maintainer). DCO sign-off must cover every commit (docs included), so it lives
# in its own always-on workflow (dco.yml), unaffected by this skip.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether the change touches anything outside the docs/legal set. Mirrors
  # the #125 docs paths (docs/**, **/*.md, LICENSE, NOTICE) but at the JOB level so
  # the workflow itself always runs and the `gate` job can always report. Uses the
  # same `gh api` idiom as dco.yml / require-issue.yml — no extra action dependency.
  # Fails safe: if the changed-file list can't be determined, treat the change as
  # code so the Rust gate runs rather than being silently skipped.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      BEFORE: ${{ github.event.before }}
      SHA: ${{ github.sha }}
    steps:
      - name: Determine whether any non-docs (code) file changed
        id: filter
        run: |
          set -uo pipefail
          if [ -n "$PR" ]; then
            files=$(gh api "repos/$REPO/pulls/$PR/files" --paginate --jq '.[].filename')
          else
            files=$(gh api "repos/$REPO/compare/$BEFORE...$SHA" --jq '.files[].filename' 2>/dev/null) || files=""
          fi
          if [ -z "$files" ]; then
            echo "could not determine changed files; running the Rust gate (fail-safe)"
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*)        continue ;;  # docs/**
              *.md)          continue ;;  # **/*.md
              LICENSE|NOTICE) continue ;;
            esac
            code=true
            break
          done <<< "$files"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "code-affecting change: $code"

  rust:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v7

      # Installs the toolchain pinned by rust-toolchain.toml (with rustfmt and
      # clippy) on first use.
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Prebuilt binaries, so the license/advisory wall, the unused-dependency
      # check, and the spell check cost seconds, not a from-source compile.
      # `cargo xtask ci` shells out to all three (hard-failing in CI if any is
      # missing — see xtask).
      - name: Install cargo-deny + cargo-machete + typos
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-machete,typos-cli

      # The docs renderer deps, so `cargo xtask ci`'s docs gate (#598) runs the
      # same lint + link-audit here as the standalone docs-check workflow —
      # pinned to the identical versions.
      - name: Install docs renderer deps
        run: pip install "markdown-it-py[linkify]==3.0.0" "PyYAML==6.0.2"

      # Runs BOTH dependency walls (see xtask::cargo_deny_check): the default graph —
      # the artifact we ship — and, via deny-all-features.toml, the off-by-default
      # `fdb`/`tikv` trees, which the default graph cannot see at all (#543). Kept in
      # xtask rather than as a YAML step so this stays the complete local equivalent
      # of the gate (ADR-0009).
      - name: cargo xtask ci
        run: cargo xtask ci

      # EC throughput numbers (issue #99), tracked for regression visibility in
      # the run log — NOT a gate: CI wall-clock is noisy, so a slowdown never
      # blocks a merge. Reuses the warm cache from the step above (the bench is
      # already compiled by `cargo xtask ci`'s `build --all-targets`).
      - name: cargo xtask bench (tracked, non-gating)
        run: cargo xtask bench
        continue-on-error: true

  # The TiKV anti-rot bar (#443). TiKV is the RETAINED FALLBACK: development is stood
  # down, FoundationDB is the production backend (ADR-0042), and the crate/feature/CLI
  # variant stay in the tree "community-continuable". This job is what makes
  # "continuable" a fact instead of a claim — before #443 NO workflow compiled the
  # `tikv` feature at all, so the fallback could have rotted silently.
  #
  # The bar is deliberately BUILD-ONLY, and it is the honest maximum:
  #   * the TiKV Tier-1 fault battery is RED on main for a pre-existing reason
  #     (tikv-client's own 2 s per-RPC timeout during leader election, #537), so a
  #     conformance/fault gate could not be green today; and
  #   * the nightly TiKV conformance workflow (#420) was never built. It stays in the
  #     continuation backlog for whoever picks the backend up.
  # Claiming a bar we do not run would be the hollow green #442's verdict warns about.
  #
  # It compiles the WHOLE tikv surface, not just the backend crate: the `Tikv` variant of
  # `MetadataBackend` and its selection arms live in `crates/server/src/cli.rs` behind
  # `#[cfg(feature = "tikv")]`, so checking only `wyrd-metadata-tikv` would leave the CLI
  # wiring — the very thing #443 retains — free to rot. `--tests` keeps the TiKV test
  # suite compiling too, even though it is not executed here.
  #
  # The server row is `tikv,etcd`, not `tikv`: the S3 gateway's metadata×coordination
  # dispatch arm is `#[cfg(all(feature = "tikv", feature = "etcd"))]`, so a `--features tikv`
  # build cfg's it out — the bar could stay green while the combination rotted. And that
  # combination is what the retained fallback stack actually runs
  # (`deploy/small-multi-node/`, FEATURES="tikv,etcd", gateways on `--metadata-backend tikv
  # --coordination-backend etcd`). Compiling the pair is a superset of the tikv-only arms.
  #
  # NOT here: the ADVISORY audit of the tikv dependency tree. That belongs to the wall,
  # not to this job, and lives in `cargo xtask ci` (xtask::cargo_deny_check), which runs
  # `cargo deny --all-features --config deny-all-features.toml check advisories` on every
  # PR and on every laptop (#543). It needs no toolchain — cargo-deny reads Cargo.lock and
  # compiles nothing — so duplicating it here would buy nothing and cost a cargo-deny
  # install in a job whose whole point is the compiler.
  tikv:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      CI: "true"
      # Opts the tikv rows into xtask's feature-gated checks. Unset everywhere else, which
      # is why a laptop / PDCA worktree never compiles the pre-1.0 tikv-client tree.
      WYRD_TIKV_TOOLCHAIN: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      # tikv-client's transitive tree needs a C toolchain and OpenSSL headers (grpcio /
      # prost build protobuf definitions at build time; openssl-sys needs pkg-config to
      # find libssl). Absent any of these the feature does not compile at all. This is
      # the SAME list the container builds already use to produce a `--features tikv`
      # binary — `deploy/docker/wyrd/Dockerfile` and
      # `crates/chunkstore-grpc/tests/dserver/Dockerfile` — kept identical on purpose.
      - name: Install tikv-client native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake protobuf-compiler libssl-dev pkg-config

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: tikv

      # These two rows are exactly `xtask::feature_gated_checks(tikv: true, ..)`. They are
      # spelled out rather than run via `WYRD_TIKV_TOOLCHAIN=1 cargo xtask ci`, which would
      # re-run the entire gate (fmt, clippy, tests, deny, conformance) a second time just to
      # reach two `cargo check`s. The xtask side is pinned by
      # `ci_type_checks_feature_gated_metadata_scenario`, so if you change the rows there,
      # change them here too — the local command is:
      #     WYRD_TIKV_TOOLCHAIN=1 cargo xtask ci
      - name: Compile the tikv feature (crate + cli.rs selection arms + tikv×etcd + tests)
        run: |
          cargo clippy -p wyrd-metadata-tikv --features tikv --tests
          cargo clippy -p wyrd-server --features tikv,etcd --tests

  # Spell-check (typos) as its OWN always-on status check. Unlike the Rust gate,
  # it carries no docs-skip: prose lives in docs/ and specs, so a docs-only PR is
  # exactly when it matters most. Installed via the same prebuilt-binary action as
  # cargo-deny (no new third-party action). Config + allowlist live in typos.toml.
  # Always reports a `typos` status, so it can be a required check without ever
  # wedging a docs-only PR.
  typos:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli
      - name: Spell-check (source + docs)
        run: typos

  # Always-runs aggregation: this is the job to mark as a required status check.
  # It needs `changes`, `rust` and `tikv`, and runs unconditionally (`if: always()`),
  # so it reports a status even when those were skipped on a docs-only change.
  # Success iff the change was classified (changes succeeded) AND the Rust gate and the
  # TiKV anti-rot bar each either passed or were skipped (docs-only); failure otherwise.
  #
  # Why `tikv` gates: #443's acceptance criterion is that the `tikv` feature KEEPS
  # COMPILING. A bar that does not fail a PR is not a bar — the fallback would rot on
  # the first refactor that misses a `#[cfg(feature = "tikv")]` arm, and the "you can
  # pick this up" promise would be false. It is cheap (two `cargo check`s) and fully
  # within a contributor's control.
  #
  # (The tikv tree's ADVISORY exposure is guarded elsewhere — by `cargo xtask ci`'s
  # second dependency wall, `deny-all-features.toml` (#543) — so a new advisory there
  # turns `rust` red, not this job.)
  gate:
    needs: [changes, rust, tikv]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify the Rust gate and the TiKV anti-rot bar passed or were skipped
        env:
          CHANGES: ${{ needs.changes.result }}
          RUST: ${{ needs.rust.result }}
          TIKV: ${{ needs.tikv.result }}
        run: |
          set -u
          if [ "$CHANGES" != "success" ]; then
            echo "::error::change classification failed (changes result=$CHANGES)"
            exit 1
          fi
          if [ "$RUST" != "success" ] && [ "$RUST" != "skipped" ]; then
            echo "::error::the Rust gate did not pass (rust result=$RUST)"
            exit 1
          fi
          if [ "$TIKV" != "success" ] && [ "$TIKV" != "skipped" ]; then
            echo "::error::the TiKV anti-rot bar did not pass (tikv result=$TIKV). The tikv \
          feature must keep compiling — it is the retained fallback (#443)."
            exit 1
          fi
          echo "OK: rust=$RUST tikv=$TIKV (success = passed or docs-only skip)"
          exit 0
