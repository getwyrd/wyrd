# Throwaway SINGLE-NODE etcd for the #365 L5 Coordination conformance run (proposal
# 0015 §"Deployment prerequisite"). Like `deploy/tikv-single-node`, this lives under
# `deploy/`, OUTSIDE the Cargo workspace (ADR-0010): the structural guard that keeps
# orchestrator coupling out of the crates. It is NOT the production tier — the
# consolidated single-zone stack (`deploy/small-multi-node/`: 3-node TiKV + its PD
# ensemble + a 3-node etcd ensemble for L5 + D servers / custodians / gateways) is
# M4.5 (#256).
#
# A single etcd node is sufficient to exercise the WHOLE `Coordination` contract
# suite AND the cross-instance properties (single leader, mutual exclusion, fenced
# locks, cross-process discovery) — those are about multiple CLIENTS against one
# cluster, not multiple etcd nodes. Host networking so a client on the HOST reaches
# etcd at 127.0.0.1:2379. Driven by `cargo xtask etcd-conformance`, which brings the
# stack up, sets WYRD_ETCD_ENDPOINTS=http://127.0.0.1:2379, rebuilds
# `wyrd-coordination-etcd --features etcd`, runs the suite, then tears it down.
name: wyrd-etcd-l5
services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    network_mode: host
    command:
      - /usr/local/bin/etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://127.0.0.1:2379
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-peer-urls=http://127.0.0.1:2380
      - --initial-advertise-peer-urls=http://127.0.0.1:2380
      - --initial-cluster=etcd0=http://127.0.0.1:2380
      - --initial-cluster-state=new
    restart: on-failure
