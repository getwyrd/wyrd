[package]
name = "wyrd-proto"
description = "Minimal protobuf/prost wire-contract message shapes (commit, chunk put/get)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

# `prost` is a runtime dependency of the code generated by `tonic::include_proto!`
# (the message structs derive `prost::Message`), but that use lives in macro-
# expanded code, not a literal `use prost` in this crate's source — so
# cargo-machete's static scan reports it as unused. Pin it as a known false
# positive rather than removing a genuinely-required dependency.
[package.metadata.cargo-machete]
ignored = ["prost"]

[dependencies]
prost.workspace = true

# gRPC client + server stubs for the ChunkStore service (M2.1). tonic-prost
# carries the ProstCodec the generated stubs use (split out of tonic in 0.14).
# Cfg-aliased (proposal 0004): a normal build links real `tonic`; a `--cfg
# madsim` build links `madsim-tonic` *as* `tonic`, so `tonic::include_proto!`
# pulls the simulated stubs and the same client code runs on madsim's network.
[target.'cfg(not(madsim))'.dependencies]
tonic.workspace = true
tonic-prost.workspace = true

# Declared directly, not via workspace inheritance: cargo forbids renaming an
# inherited dependency (`package` is ignored alongside `workspace = true`), so the
# madsim-tonic version is pinned once in the workspace comment above and matched
# here. `default-features = false` keeps the DST profile plaintext (no TLS).
[target.'cfg(madsim)'.dependencies]
tonic = { package = "madsim-tonic", version = "0.6.0", default-features = false }

[build-dependencies]
# protox is a pure-Rust protobuf compiler, so the build needs no system `protoc`
# (ADR-0016: contributors run the build on any OS without extra tooling). Its
# FileDescriptorSet is handed to tonic-prost-build's `compile_fds` (normal build)
# or, under `--cfg madsim`, written to a file and fed to madsim-tonic-build with
# `skip_protoc_run` so codegen still needs no system `protoc`.
prost.workspace = true
protox.workspace = true
tonic-prost-build.workspace = true
madsim-tonic-build.workspace = true

# Inherit the workspace lint policy (single source of truth in the root
# Cargo.toml [workspace.lints.*]).
[lints]
workspace = true
