syntax = "proto3";

// Minimal chunk put/get wire shapes for Milestone 0. gRPC transport is deferred
// (proposal 0001); only the message shapes are defined now.
package wyrd.v0;

// A 128-bit chunk id (ADR-0019), carried as high/low 64-bit halves because
// protobuf has no native 128-bit integer.
message ChunkId {
  fixed64 hi = 1;
  fixed64 lo = 2;
}

message ChunkPutRequest {
  ChunkId id = 1;
  // The stored fragment bytes, exactly as specified by chunk-format (ADR-0019).
  bytes fragment = 2;
}

message ChunkPutResponse {}

message ChunkGetRequest {
  ChunkId id = 1;
}

message ChunkGetResponse {
  // Empty when no fragment is stored for the requested id.
  bytes fragment = 1;
}
